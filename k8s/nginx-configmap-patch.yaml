# Patches the NGINX Inc. Ingress Controller's global ConfigMap.
# Apply this if uploads still return 413 despite the per-ingress annotation.
#
# The controller ConfigMap is usually in the nginx-ingress namespace.
# Confirm with: kubectl get configmap -n nginx-ingress
#
# Apply:
#   kubectl apply -f k8s/nginx-configmap-patch.yaml
#
# Or patch in-place:
#   kubectl patch configmap nginx-config \
#     -n nginx-ingress \
#     --type merge \
#     -p '{"data":{"client-max-body-size":"0","proxy-read-timeout":"600","proxy-send-timeout":"600","proxy-connect-timeout":"600","proxy-request-buffering":"False","proxy-buffering":"False"}}'
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config # ← default name; check yours with kubectl get configmap -n nginx-ingress
  namespace: nginx-ingress # ← default namespace for the NGINX Inc. ingress controller
data:
  client-max-body-size: "0" # unlimited — full files are streamed, no size cap
  proxy-read-timeout: "600"
  proxy-send-timeout: "600"
  proxy-connect-timeout: "600"
  proxy-request-buffering: "False"
  proxy-buffering: "False"
