# Patches the nginx ingress controller's global ConfigMap.
# Apply this if uploads still return 413 despite the per-ingress annotation.
#
# IMPORTANT — keep proxy-body-size in sync with CHUNK_SIZE in deployment.yaml.
# Each upload request carries one chunk + multipart form overhead (~1 KiB).
# proxy-body-size must be >= CHUNK_SIZE + overhead, or set to "0" (unlimited).
#
#   CHUNK_SIZE (deployment.yaml)  →  proxy-body-size (here + ingress.yaml)
#   10 MiB  (10485760)            →  "11m"   (current default, 1 MiB headroom)
#   25 MiB  (26214400)            →  "26m"
#   "0" / unlimited               →  "0"
#
# The controller ConfigMap is usually in the ingress-nginx namespace.
# Confirm with: kubectl get configmap -n ingress-nginx
#
# Apply:
#   kubectl apply -f k8s/nginx-configmap-patch.yaml
#
# Or patch in-place:
#   kubectl patch configmap ingress-nginx-controller \
#     -n ingress-nginx \
#     --type merge \
#     -p '{"data":{"proxy-body-size":"11m","proxy-read-timeout":"600","proxy-send-timeout":"600","proxy-connect-timeout":"600"}}'
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-controller   # ← default name; check yours with kubectl get configmap -n ingress-nginx
  namespace: ingress-nginx          # ← default namespace for the nginx ingress controller
data:
  # 11m = 10 MiB chunk + 1 MiB headroom for multipart form overhead.
  # Increase proportionally if you raise CHUNK_SIZE in deployment.yaml.
  proxy-body-size: "11m"
  proxy-read-timeout: "600"
  proxy-send-timeout: "600"
  proxy-connect-timeout: "600"
