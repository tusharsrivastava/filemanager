# Persistent Volume Claim for filemanager.
# storageClassName: use "longhorn" for Longhorn, "local-path" for Rancher local-path, etc.
#
# accessModes: ReadWriteOnce (RWO) is strongly preferred with Longhorn.
# Longhorn implements RWX via an NFS share-manager pod, adding a full network
# hop on every write and dramatically reducing throughput vs RWO (direct iSCSI).
# Since filemanager runs as a single replica, RWO is sufficient.
#
# NOTE: access mode cannot be changed on an existing PVC — you must delete and
# recreate it (backup data first).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filemanager-media-pvc
  namespace: filemanager
  labels:
    app: filemanager
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn # ← adjust to your storage class
  resources:
    requests:
      storage: 100Gi # ← adjust to your media volume size
