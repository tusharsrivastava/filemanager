# Persistent Volume Claim — bind to your existing Jellyfin media PVC
# or create a fresh one here. Adjust storageClassName to match your homelab
# (e.g., local-path, nfs-client, longhorn, openebs-hostpath).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filemanager-media-pvc
  namespace: filemanager
  labels:
    app: filemanager
spec:
  accessModes:
    - ReadWriteMany # RWX if your storage supports it; else ReadWriteOnce
  storageClassName: local-path # ← change to your storage class
  resources:
    requests:
      storage: 100Gi # ← adjust to your media volume size
