# Optional ingress — adjust to your ingress controller (nginx, traefik, etc.)
# Remove if you prefer NodePort or LoadBalancer.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: filemanager
  namespace: filemanager
  annotations:
    # Must be >= CHUNK_SIZE (deployment.yaml) + multipart overhead (~1 MiB).
    # Current default: CHUNK_SIZE=10 MiB → client-max-body-size=11m (1 MiB headroom).
    # If you raise CHUNK_SIZE, raise this value proportionally.
    # Set to "0" for unlimited (requires client_max_body_size 0 at every
    # nginx layer including any external reverse proxy).
    #
    # NOTE: nginx.org/client-max-body-size is for the NGINX Inc. controller (nginx.com / F5).
    # If you use the community ingress-nginx controller, use:
    #   nginx.ingress.kubernetes.io/proxy-body-size: "11m"
    nginx.org/client-max-body-size: "11m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
spec:
  ingressClassName: nginx # ← change to your ingress class
  rules:
    - host: filemanager.local # ← change to your hostname / local DNS entry
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: filemanager
                port:
                  name: http
