# Optional ingress — adjust to your ingress controller (nginx, traefik, etc.)
# Remove if you prefer NodePort or LoadBalancer.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: filemanager
  namespace: filemanager
  annotations:
    # "0" = unlimited in nginx (client_max_body_size 0).
    # If uploads still return 413, also apply k8s/nginx-configmap-patch.yaml
    # to override the controller's global default.
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
spec:
  ingressClassName: nginx # ← change to your ingress class
  rules:
    - host: filemanager.local # ← change to your hostname / local DNS entry
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: filemanager
                port:
                  name: http
