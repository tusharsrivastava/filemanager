# Optional ingress — adjust to your ingress controller (nginx, traefik, etc.)
# Remove if you prefer NodePort or LoadBalancer.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: filemanager
  namespace: filemanager
  annotations:
    # "0" = unlimited — required for large file uploads (movies, ISOs, etc.).
    # Validate upload size in the application layer if needed.
    nginx.org/client-max-body-size: "0"
    nginx.org/proxy-read-timeout: "600"
    nginx.org/proxy-send-timeout: "600"
    nginx.org/proxy-connect-timeout: "600"
    nginx.org/location-snippets: |
      proxy_request_buffering off;
      proxy_buffering off;
spec:
  ingressClassName: nginx # ← change to your ingress class
  rules:
    - host: filemanager.local # ← change to your hostname / local DNS entry
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: filemanager
                port:
                  name: http
